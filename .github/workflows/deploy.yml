name: Build and Deploy
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with: { dotnet-version: '9.0.x' }
    - run: dotnet restore QubiqonFinanceHub.sln
    - run: dotnet build QubiqonFinanceHub.sln -c Release --no-restore
    - run: dotnet publish src/QubiqonFinanceHub.API/QubiqonFinanceHub.API.csproj -c Release -o ./publish
    - uses: actions/upload-artifact@v4
      with: { name: api-package, path: ./publish }

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
    - uses: actions/download-artifact@v4
      with: { name: api-package, path: ./publish }
    - uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish

  deploy-db:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
    - uses: actions/checkout@v4
    - uses: azure/sql-action@v2.3
      with:
        connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        path: './scripts/001_CreateSchema.sql'
    - uses: azure/sql-action@v2.3
      with:
        connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        path: './scripts/002_MultiTenant_Schema.sql'
